<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha DB - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- ========================================== -->
    <!-- LIBRERÍA DE SUPABASE (OBLIGATORIO) -->
    <!-- ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- ========================================== -->
    <!-- CONFIGURACIÓN DE SUPABASE -->
    <!-- ========================================== -->
    <script src="js/config/supabase.js"></script>
    
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="login-container">
        <div class="user-icon-section">
            <div class="line"></div>
            <div class="user-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="line"></div>
        </div>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" id="username" placeholder="USERNAME" class="input-field" autocomplete="off">
            </div>

            <div class="input-group" style="position: relative;">
                <div class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" id="password" placeholder="••••••" class="input-field" style="flex:1; padding: 14px 15px; background: transparent; border: none; outline: none; color: #FFFFFF; font-size: 13px;">
                <button type="button" onclick="togglePassword()" style="background: transparent; border: none; color: #8B949E; cursor: pointer; padding: 0 15px; font-size: 18px;">👁️</button>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    <span class="checkmark"></span>
                    Recordarme
                </label>
                <a href="#" class="forgot-password" id="forgotPassword">¿Olvidaste tu contraseña?</a>
            </div>
        </form>

        <div class="divider"></div>

        <div class="footer">
            designed by <span>Alpha Master</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = event.currentTarget;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                icon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
